name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_HOST: 127.0.0.1
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASS: postgres
      PG_DB: trophe_dev
      PGPASSWORD: postgres
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/trophe_dev
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      CI: true
      SKIP_SUPABASE_START: 1
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: npm ci

      - name: Guard against drizzle-kit introspect wrapper
        run: |
          for f in drizzle/0*.sql; do
            if head -3 "$f" | grep -qE '^[[:space:]]*/\*'; then
              echo "::error file=$f::Migration starts with /* — drizzle-kit introspect wrapper not stripped. Run the migration through bootstrap-local.sh before committing."
              exit 1
            fi
          done
          echo "✅ No uncommitted drizzle-kit introspect wrappers found"

      - name: Verify hardcode guard catches known-bad fixture
        # Self-test: confirms grep works in this CI environment.
        # If this step fails to FIND the fixture, the real guard is broken.
        run: |
          set -euo pipefail
          if grep -rEn 'brain_user|127\.0\.0\.1:5433|localhost:5433' \
               tests/_guard_fixtures/; then
            echo "✅ Guard fixture detected as expected — grep is working"
          else
            echo "::error::Guard self-test FAILED. grep could not find the known-bad fixture."
            echo "::error::The real guard below cannot be trusted. Investigate before merging."
            exit 1
          fi

      - name: Guard against hardcoded local DB credentials in source
        # grep is available on every Ubuntu runner — no install required.
        # Scripts (scripts/**) excluded: they default to local ports by design.
        # grep exits 0 on match (fires if-branch → exit 1 to fail CI),
        # exits 1 on no match (guard passes). No || true suppressor.
        run: |
          set -euo pipefail
          if grep -rEn 'brain_user|127\.0\.0\.1:5433|localhost:5433' \
               --include='*.ts' --include='*.tsx' \
               tests/ agents/ lib/ app/ db/; then
            echo "::error::Source files contain hardcoded local DB credentials. Use DATABASE_URL — see .env.local.example."
            exit 1
          fi
          echo "✅ No hardcoded local DB credentials found in source code"

      - name: Bootstrap local database
        run: npm run db:bootstrap

      - name: Verify DB inventory
        run: npm run db:verify

      - name: Capture DB explain plans
        run: npm run db:explain

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint -- --no-cache

      - name: Unit and integration tests
        run: npm test

      - name: Enterprise readiness checks
        run: npm run readiness

      - name: Agent eval smoke
        run: npm run evals
        env:
          EVAL_REPORT_DIR: artifacts/evals

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Production build
        run: npm run build

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-eval-reports
          path: artifacts/evals/
          if-no-files-found: ignore

      - name: Upload DB artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-artifacts
          path: artifacts/db/
          if-no-files-found: ignore
